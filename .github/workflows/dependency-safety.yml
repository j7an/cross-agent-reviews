name: Dependency Safety

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  statuses: write
  issues: write

concurrency:
  group: dependency-safety-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  safety:
    uses: j7an/shared-workflows/.github/workflows/dependency-safety.yml@a8655fe2f5fb3aabfe5531b283956c683ba3029b  # v3.0.0
    with:
      minimum_release_age_days: 5  # Must match cooldown.default-days in .github/dependabot.yml.
